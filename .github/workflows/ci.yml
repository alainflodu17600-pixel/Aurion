name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Aurion.slnx

    - name: Build
      run: dotnet build Aurion.slnx -c Release --no-restore

    - name: Test
      run: dotnet test --no-build --verbosity normal

    - name: Publish artifacts (multi-rid)
      run: |
        dotnet publish Aurion/Aurion.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o publish/linux-x64
        dotnet publish Aurion/Aurion.csproj -c Release -r linux-arm64 --self-contained true -p:PublishSingleFile=true -o publish/linux-arm64
        dotnet publish Aurion/Aurion.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/win-x64
        dotnet publish Aurion/Aurion.csproj -c Release -r win-x86 --self-contained true -p:PublishSingleFile=true -o publish/win-x86

    - name: Create archives
      run: |
        cd publish
        tar -czf linux-x64.tar.gz linux-x64 || true
        tar -czf linux-arm64.tar.gz linux-arm64 || true
        zip -r win-x64.zip win-x64 || true
        zip -r win-x86.zip win-x86 || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aurion-publish
        path: publish

  make-msi:
    runs-on: windows-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: aurion-publish
        path: publish

    - name: Install WiX (choco)
      run: |
        choco install wixtoolset -y
      shell: powershell

    - name: Build MSI
      run: |
        powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\create_windows_installer.ps1

    - name: Upload MSI
      uses: actions/upload-artifact@v4
      with:
        name: aurion-msi
        path: publish\*.msi

  make-deb:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: aurion-publish
        path: publish

    - name: Install dpkg-deb
      run: sudo apt-get update && sudo apt-get install -y dpkg-dev

    - name: Build DEB
      run: |
        bash ./scripts/create_linux_package.sh linux-x64

    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: aurion-deb
        path: publish/*.deb

  make-dmg:
    runs-on: macos-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: aurion-publish
        path: publish

    - name: Build DMG
      run: |
        # Create a DMG from the published osx-x64 folder
        hdiutil create -volname Aurion -srcfolder publish/osx-x64 -ov -format UDZO Aurion.dmg

    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: aurion-dmg
        path: Aurion.dmg

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        if: false
        run: echo "Skip: configure secrets to publish images"
      - name: Build multi-arch image (optional)
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t aurion:ci --push . || true
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

